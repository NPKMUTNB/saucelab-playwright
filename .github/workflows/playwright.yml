name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allow manual trigger
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm install
    
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    
    - name: Run Playwright tests
      run: npx playwright test tests/mcp-saucedemo.spec.js --project=chromium
      env:
        # Set CI environment variable for Playwright
        CI: true
    
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: test-results/
        retention-days: 30

  # Run MCP specific tests
  mcp-tests:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v5
    
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
    
    - name: Install dependencies
      run: npm install
    
    - name: Install Playwright Browsers
      run: npx playwright install chromium --with-deps
    
    - name: Run MCP SauceDemo Tests (JavaScript)
      run: npx playwright test tests/mcp-saucedemo.spec.js
      env:
        CI: true
    
    - name: Upload MCP Test Videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mcp-test-videos
        path: test-results/**/*.webm
        retention-days: 30
    
    - name: Upload MCP Test Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: mcp-playwright-report
        path: playwright-report/
        retention-days: 30
