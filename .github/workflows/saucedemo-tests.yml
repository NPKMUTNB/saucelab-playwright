name: MCP SauceDemo E2E Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - 'playwright.config.js'
      - 'package*.json'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'tests/**'
      - 'playwright.config.js'
      - 'package*.json'
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  saucedemo-mcp-tests:
    name: MCP SauceDemo Tests (Chrome)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
    
    - name: Install dependencies
      run: npm install
    
    - name: Install Playwright browsers
      run: npx playwright install chromium --with-deps
    
    - name: Run SauceDemo MCP tests (JavaScript)
      run: npx playwright test tests/mcp-saucedemo.spec.js --project=chromium
      env:
        CI: true
    
    - name: Generate test summary
      if: always()
      run: |
        echo "## 🎭 MCP SauceDemo Test Results (Chrome)" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "test-results/.last-run.json" ]; then
          echo "### Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Test File: mcp-saucedemo.spec.js" >> $GITHUB_STEP_SUMMARY
          echo "- Browser: Chrome (Chromium)" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: CI/CD Pipeline" >> $GITHUB_STEP_SUMMARY
        fi
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📊 Artifacts Available" >> $GITHUB_STEP_SUMMARY
        echo "- Test videos and screenshots" >> $GITHUB_STEP_SUMMARY
        echo "- HTML test report" >> $GITHUB_STEP_SUMMARY
        echo "- Trace files for debugging" >> $GITHUB_STEP_SUMMARY
    
    - name: Upload test videos
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: saucedemo-videos-chrome
        path: test-results/**/*.webm
        retention-days: 7
    
    - name: Upload test screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: saucedemo-screenshots-chrome
        path: test-results/**/*.png
        retention-days: 7
    
    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: saucedemo-report-chrome
        path: playwright-report/
        retention-days: 14
    
    - name: Upload trace files
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: saucedemo-traces-chrome
        path: test-results/**/*.zip
        retention-days: 7

  notify-results:
    name: Notify Test Results
    needs: saucedemo-mcp-tests
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Create test summary
      run: |
        echo "## 🎯 MCP SauceDemo Test Suite Completed" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Test Status" >> $GITHUB_STEP_SUMMARY
        echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 📋 Test Coverage" >> $GITHUB_STEP_SUMMARY
        echo "✅ Login functionality" >> $GITHUB_STEP_SUMMARY
        echo "✅ Product selection and cart operations" >> $GITHUB_STEP_SUMMARY
        echo "✅ Checkout process with random data" >> $GITHUB_STEP_SUMMARY
        echo "✅ Order completion verification" >> $GITHUB_STEP_SUMMARY
        echo "✅ Chrome browser compatibility" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔍 Verification Points" >> $GITHUB_STEP_SUMMARY
        echo "- 'Thank you for your order!' message validation" >> $GITHUB_STEP_SUMMARY
        echo "- Cart functionality and item counting" >> $GITHUB_STEP_SUMMARY
        echo "- Random data generation for forms" >> $GITHUB_STEP_SUMMARY
        echo "- Video recording of test execution" >> $GITHUB_STEP_SUMMARY